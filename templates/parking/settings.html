{% extends 'base.html' %}
{% block content %}
<h2>System Settings</h2>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Pricing</button>
    </form>
</div>
<h3>Users</h3>
<table>
    <tr><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
    {% for u in users %}
    <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td>
            <form method="post" action="{% url 'parking:user_role_update' u.id %}" class="inline-form">
                {% csrf_token %}
                <select name="role">
                    <option value="user" {% if u.role == 'user' %}selected{% endif %}>User</option>
                    <option value="admin" {% if u.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
                <button type="submit">Update Role</button>
            </form>
            {% if user.id != u.id %}
            <form method="post" action="{% url 'parking:user_delete' u.id %}">
                {% csrf_token %}
                <button type="submit">Delete</button>
            </form>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
